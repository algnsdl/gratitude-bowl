<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>아동3교구의 감사그릇</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="page">
    <section class="hero">
      <img src="guide.png" alt="감사의 그릇 안내 이미지" class="guide-image" />
    </section>

    <section class="form-card">
      <h2>감사기도제목 나눔</h2>

      <form id="gratitudeForm">
        <label>
          속회
          <select id="group" required>
            <option value="">속회를 선택해주세요.</option>
            <option value="1속">1속</option>
            <option value="2속">2속</option>
            <option value="3속">3속</option>
            <option value="4속">4속</option>
            <option value="5속">5속</option>
            <option value="6속">6속</option>
            <option value="♥">♥</option>
          </select>
        </label>

        <label>
          이름
          <input id="name" type="text" placeholder="이름을 입력해주세요." required />
        </label>

        <label>
          감사기도제목
          <textarea id="prayer" placeholder="하나님께 감사한 일을 적어주세요." required></textarea>
        </label>

        <button type="submit">감사 그릇에 담기</button>
      </form>

      <p id="message"></p>
    </section>

<section class="visual-section">
  <h2>하나님 은혜가 가득한 감사 그릇</h2>

  <div class="count-box">
    <span id="gratitudeCount">
      ❤️ 지금까지 0개의 감사가 담겼어요!
    </span>
  </div>

  <p class="hint">
    하트를 누르면 감사기도제목을 확인할 수 있어요.
  </p>

      <div class="basket-wrapper">
        <div class="basket">
          <div class="basket-inner" id="heartContainer"></div>
        </div>
      </div>
    </section>
  </main>

  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="close-button" id="closeModal">×</button>
      <p class="modal-group" id="modalGroup"></p>
      <h3 id="modalName"></h3>
      <p id="modalPrayer"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
